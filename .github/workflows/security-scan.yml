name: security-scan

# Runs scripts/security_scan.py on every push and pull request.
# Detects Variant B supply-chain malware indicators (disguised woff2 payload,
# folderOpen auto-run task, known C2 hosts, obfuscated JS markers).
# A non-zero exit code fails the workflow and blocks the merge.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security scan
        run: python scripts/security_scan.py
